name: HTCE-Origin CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify HTCE-Origin v1.0
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show environment
        run: |
          python --version
          python -m pip --version
          pwd
          ls -la

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile HTCE package
        run: python -m compileall htce_origin scripts tests

      - name: Scan for forbidden float literals
        run: python scripts/00_gates/scan_float_literals.py

      - name: Check version sync
        run: python scripts/00_gates/check_version_sync.py

      - name: Check mathematical invariants
        run: python scripts/00_gates/check_invariants.py

      - name: Run v1 clean system revalidation
        run: python -c "from htce_origin import HTCERuntime; rt=HTCERuntime(); rt.wake(); r=rt.run_v1_clean_system_revalidation(stress_steps=8, grid_size=5).as_payload(); assert r['passed'] is True; print('v1_clean_system_revalidation: PASS')"

      - name: Verify release manifest
        run: python scripts/05_artifacts/verify_manifest.py
          if [ -f scripts/verify_trace.py ]; then
            python scripts/verify_trace.py
          else
            echo "scripts/verify_trace.py not found; skipping trace standalone check"
          fi

      - name: Verify release manifest
        run: python scripts/verify_manifest.py
